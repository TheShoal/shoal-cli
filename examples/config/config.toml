# Shoal — global configuration
# Copy to ~/.config/shoal/config.toml

[general]
default_tool = "claude"
state_dir = "~/.local/share/shoal"
worktree_dir = ".worktrees"  # relative to project root

[tmux]
session_prefix = "shoal"
popup_width = "90%"
popup_height = "90%"
popup_key = "S"  # Prefix + S

# Optional: Commands to run when creating a new session
# You can use variables: {tool_command}, {work_dir}, {session_name}, {tmux_session}
# startup_commands = [
#     "send-keys -t {tmux_session} 'nvim .' Enter",
#     "new-window -t {tmux_session} -n tool '{tool_command}'",
#     "new-window -t {tmux_session} -d -n monitor 'btop'",
#     "select-window -t {tmux_session}:2"
# ]

[status_bar]
max_display = 5
separator = "  "
flash_waiting = true

[notifications]
enabled = true
# macOS osascript notifications for waiting sessions
timeout_seconds = 300

[robo]
default_tool = "opencode"
default_profile = "default"
