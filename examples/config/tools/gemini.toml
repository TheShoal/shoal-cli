# Shoal — Gemini CLI tool definition
# Place in ~/.config/shoal/tools/gemini.toml

[tool]
name = "gemini"
command = "gemini"
icon = "💎"

[detection]
busy_patterns = ["thinking", "generating"]
waiting_patterns = [">", "confirm"]
error_patterns = ["Error:", "error:"]
idle_patterns = [">"]

[mcp]
# Gemini does not currently support MCP auto-configuration
config_cmd = ""
config_file = ""
socket_env = ""
