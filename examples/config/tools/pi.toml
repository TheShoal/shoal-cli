# Shoal — pi coding agent tool definition (legacy)
# https://github.com/badlogic/pi-mono/tree/main/packages/coding-agent
# Install: npm install -g @mariozechner/pi-coding-agent
# Place in ~/.config/shoal/tools/pi.toml
#
# NOTE: The actively maintained fork is oh-my-pi (binary: omp).
# Use omp.toml instead unless you specifically need the original pi binary.
# See docs/AGENTS.md for the full CLI reference.

[tool]
name = "pi"
command = "pi"
icon = "🥧"
status_provider = "pi"
# Prompt delivery: "arg" passes the prompt as a positional argument.
# (Legacy tool — prefer omp.toml for the actively maintained fork.)
input_mode = "arg"

[detection]
# Pi uses a TUI with differential rendering; detect from pane output
busy_patterns = ["thinking", "generating", "executing", "reading", "writing", "editing"]
waiting_patterns = ["permission", "confirm", "approve", "y/n"]
error_patterns = ["Error:", "error:", "ERROR", "FAILED"]

[mcp]
# Pi uses extensions for MCP, not built-in support
config_cmd = ""
config_file = ""
socket_env = ""
