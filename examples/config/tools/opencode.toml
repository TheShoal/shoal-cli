# Shoal — OpenCode tool definition
# Place in ~/.config/shoal/tools/opencode.toml
# Compatibility backend: status detection is best-effort and regex-based.

[tool]
name = "opencode"
command = "opencode"
icon = "🌐"
status_provider = "opencode_compat"

[detection]
# OpenCode uses a TUI with a bordered input box
busy_patterns = ["working", "generating", "thinking"]
waiting_patterns = ["│ >", "permission"]
error_patterns = ["error", "Error"]
idle_patterns = ["│ >"]

[mcp]
# OpenCode uses a JSON config file for MCP servers
config_cmd = ""
config_file = ".opencode.json"
socket_env = ""
