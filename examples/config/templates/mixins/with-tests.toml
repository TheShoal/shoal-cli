# Shoal — Test runner window mixin
# Appends a test runner window. Add to any template via: mixins = ["with-tests"]

[mixin]
name = "with-tests"
description = "Adds a test runner window"

[[windows]]
name = "tests"

[[windows.panes]]
split = "root"
title = "test-runner"
command = "echo 'Run: just test'"
