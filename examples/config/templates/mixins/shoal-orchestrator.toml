# Shoal — Shoal orchestrator MCP mixin
# Gives the agent native MCP access to Shoal session management tools:
#   list_sessions, session_status, session_info, send_keys,
#   create_session, kill_session
# Usage in a template: mixins = ["shoal-orchestrator"]

[mixin]
name = "shoal-orchestrator"
description = "Adds Shoal orchestration MCP server"
mcp = ["shoal-orchestrator"]
