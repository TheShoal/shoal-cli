# Shoal — Base development template
# Two-pane layout: AI agent + terminal. Extend this for tool-specific templates.

[template]
name = "base-dev"
description = "Base development template with editor + terminal"
tool = "opencode"

[template.worktree]
name = "feat/{template_name}"
create_branch = true

[[windows]]
name = "editor"
focus = true

[[windows.panes]]
split = "root"
size = "65%"
title = "agent"
command = "{tool_command}"

[[windows.panes]]
split = "right"
size = "35%"
title = "terminal"
command = "echo 'Terminal ready — fish shell'"
