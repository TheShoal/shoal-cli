site_name: Shoal
site_description: Terminal-first orchestration for parallel AI coding agents
docs_dir: docs
site_dir: site
repo_url: https://github.com/TheShoal/shoal-cli
repo_name: TheShoal/shoal-cli

theme:
  name: material
  language: en
  logo: assets/robo-fish.svg
  favicon: assets/robo-fish.svg
  font:
    text: Space Grotesk
    code: IBM Plex Mono
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - gen-files:
      scripts:
        - docs/_scripts/generate_root_docs.py
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            members_order: source
            merge_init_into_class: true
            separate_signature: true
            show_root_full_path: false
            show_root_heading: true
            show_signature_annotations: true
            show_source: false

nav:
  - Home: index.md
  - Start Here:
      - Getting Started: getting-started.md
      - CLI Reference: cli-reference.md
  - Operate Shoal:
      - Flow-State Workflows: flow-state-workflows.md
      - Robo Supervisor: ROBO_GUIDE.md
      - Remote Sessions: REMOTE_GUIDE.md
      - Fish Integration: FISH_INTEGRATION.md
      - Local Templates: LOCAL_TEMPLATES.md
      - Journals: JOURNALS.md
      - HTTP Transport: HTTP_TRANSPORT.md
      - Troubleshooting: TROUBLESHOOTING.md
      - Claude Code Setup: CLAUDE_CODE_SETUP.md
  - Design the Loop:
      - Terminal Interaction Design: terminal-interaction-design.md
      - Architecture: architecture.md
      - Implementation Audit: implementation-audit.md
  - Reference:
      - Python API: reference/python-api.md
      - Extensions: EXTENSIONS.md
      - Extensions Review: EXTENSIONS_REVIEW.md
  - Project Records:
      - Delivery:
          - Roadmap: project/roadmap.md
          - Changelog: project/changelog.md
          - Release Process: project/release-process.md
          - Commit Guidelines: project/commit-guidelines.md
          - Contributing: project/contributing.md
          - Security Policy: project/security.md
      - Design Notes:
          - Architecture Guide: project/architecture-guide.md
          - Worktree Environment Init: WORKTREE_ENV_INIT.md
          - Composition Gateway: composition-gateway.md
          - Transport Spike: transport-spike.md
      - Archive:
          - Overview: archive/README.md
          - Phase 2 Handoff: archive/PHASE_2_HANDOFF.md
          - Review Notes: archive/REVIEW.md
          - Refocus Plan: archive/REFOCUS_PLAN.md
          - Gemini Notes: archive/GEMINI.md
