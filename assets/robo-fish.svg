<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 32" width="640" height="320" shape-rendering="crispEdges">
  <defs>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="fishClip">
      <path d="M14 12 h26 v-2 h6 v2 h3 v8 h-3 v2 h-6 v-2 h-26 z"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="64" height="32" fill="#0b0f14"/>

  <!-- Ambient grid dots -->
  <g opacity=".55" fill="#334155">
    <rect x="4" y="6" width="1" height="1"/><rect x="8" y="10" width="1" height="1"/><rect x="12" y="5" width="1" height="1"/>
    <rect x="52" y="6" width="1" height="1"/><rect x="56" y="12" width="1" height="1"/><rect x="50" y="14" width="1" height="1"/>
    <rect x="6" y="24" width="1" height="1"/><rect x="10" y="26" width="1" height="1"/><rect x="54" y="24" width="1" height="1"/>
  </g>

  <!-- Bubbles -->
  <g fill="#5eead4" opacity=".55">
    <rect x="6" y="20" width="1" height="1"/>
    <rect x="8" y="22" width="1" height="1"/>
    <rect x="10" y="21" width="1" height="1"/>
  </g>

  <!-- Tail -->
  <g>
    <g fill="#1f2937">
      <rect x="10" y="14" width="2" height="4"/>
      <rect x="8" y="13" width="2" height="6"/>
      <rect x="6" y="12" width="2" height="8"/>
      <rect x="4" y="13" width="2" height="6"/>
    </g>
    <g fill="#334155" opacity=".85">
      <rect x="8" y="13" width="1" height="6"/>
      <rect x="6" y="12" width="1" height="8"/>
    </g>
  </g>

  <!-- Body -->
  <g>
    <!-- core shell -->
    <g fill="#1f2937">
      <rect x="14" y="12" width="26" height="8"/>
      <rect x="18" y="11" width="18" height="1"/>
      <rect x="18" y="20" width="18" height="1"/>
    </g>

    <!-- darker belly band -->
    <g fill="#111827" opacity=".85">
      <rect x="16" y="16" width="22" height="2"/>
    </g>

    <!-- mechanical seams -->
    <g fill="#334155">
      <rect x="20" y="12" width="1" height="8"/>
      <rect x="28" y="12" width="1" height="8"/>
      <rect x="36" y="12" width="1" height="8"/>
      <rect x="22" y="14" width="1" height="1"/>
      <rect x="30" y="18" width="1" height="1"/>
      <rect x="34" y="15" width="1" height="1"/>
    </g>

    <!-- peach status accent strip -->
    <g fill="#f5a97f">
      <rect x="23" y="13" width="3" height="1"/>
      <rect x="31" y="13" width="2" height="1"/>
      <rect x="33" y="19" width="3" height="1"/>
    </g>

    <!-- fin -->
    <g>
      <g fill="#1f2937">
        <rect x="32" y="19" width="5" height="2"/>
        <rect x="34" y="21" width="3" height="1"/>
      </g>
      <g fill="#334155" opacity=".85">
        <rect x="33" y="19" width="1" height="2"/>
      </g>
    </g>
  </g>

  <!-- Head module -->
  <g>
    <g fill="#1f2937">
      <rect x="40" y="10" width="6" height="12"/>
      <rect x="46" y="12" width="3" height="8"/>
    </g>

    <!-- jaw/edge -->
    <g fill="#334155" opacity=".85">
      <rect x="40" y="10" width="6" height="1"/>
      <rect x="40" y="21" width="6" height="1"/>
      <rect x="46" y="12" width="1" height="8"/>
    </g>

    <!-- sensor eye -->
    <g>
      <rect x="43" y="15" width="2" height="2" fill="#5eead4" filter="url(#softGlow)"/>
      <rect x="43" y="15" width="2" height="2" fill="#5eead4" opacity=".55"/>
      <rect x="48" y="14" width="1" height="1" fill="#ed8796" opacity=".65"/>
    </g>
  </g>

  <!-- Scanline sweep (static position, clipped to fish) -->
  <g clip-path="url(#fishClip)">
    <rect x="30" y="12" width="10" height="8" fill="rgba(122,162,247,.20)"/>
    <g fill="rgba(255,255,255,.12)">
      <rect x="30" y="13" width="10" height="1"/>
      <rect x="30" y="15" width="10" height="1"/>
      <rect x="30" y="17" width="10" height="1"/>
      <rect x="30" y="19" width="10" height="1"/>
    </g>
  </g>

  <!-- Outline -->
  <g fill="none" opacity=".35">
    <path d="M14 12 h26 v-2 h6 v2 h3 v8 h-3 v2 h-6 v-2 h-26 z" stroke="#334155" stroke-width="1"/>
  </g>
</svg>
